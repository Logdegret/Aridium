<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Web Browser</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #6c5ce7;
            --accent-hover: #7f6ff0;
            --gradient-1: #6c5ce7;
            --gradient-2: #a855f7;
            --gradient-3: #3b82f6;
            --border: #2a2a2a;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; margin-bottom: 40px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 16px;
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 24px; font-weight: 700; cursor: pointer;
        }

        .nav-links { display: flex; gap: 10px; }

        .nav-link {
            color: var(--text-secondary); font-size: 15px; font-weight: 500;
            padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease;
            background: none; border: none; cursor: pointer; font-family: inherit;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary); background: rgba(108, 92, 231, 0.2);
        }

        .page { display: none; }
        .page.active { display: block; }

        .hero-section { text-align: center; margin-bottom: 40px; }
        .hero-title { font-size: 48px; font-weight: 700; margin-bottom: 12px; }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero-subtitle { font-size: 18px; color: var(--text-secondary); }
        .search-container { max-width: 700px; margin: 0 auto 40px; }

        .search-box {
            display: flex; align-items: center;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 16px; padding: 8px; transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--accent); box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.2);
        }

        .search-icon { margin-left: 15px; font-size: 18px; flex-shrink: 0; }

        .url-input {
            flex: 1; background: transparent; border: none;
            color: var(--text-primary); font-size: 16px; padding: 12px 15px;
            outline: none; font-family: inherit; min-width: 0;
        }

        .url-input::placeholder { color: #666; }

        .go-button {
            background: var(--accent); border: none; color: white;
            width: 45px; height: 45px; border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; font-size: 18px; flex-shrink: 0;
        }

        .go-button:hover { background: var(--accent-hover); transform: scale(1.05); }

        .search-hints {
            margin-top: 12px; font-size: 13px; color: var(--text-secondary); text-align: center;
        }

        .quick-links {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }

        .link-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 25px 20px; text-align: center;
            cursor: pointer; transition: all 0.3s ease;
        }

        .link-card:hover {
            background: var(--bg-secondary); border-color: var(--accent);
            transform: translateY(-4px); box-shadow: 0 8px 25px rgba(108, 92, 231, 0.3);
        }

        .link-emoji { font-size: 32px; display: block; margin-bottom: 8px; }
        .link-card span { font-size: 14px; font-weight: 500; color: var(--text-secondary); }

        .browser-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: var(--bg-primary); z-index: 999;
        }

        .browser-overlay.active { display: flex; flex-direction: column; }

        .browser-toolbar {
            display: flex; align-items: center; gap: 8px; padding: 10px 15px;
            background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0;
        }

        .toolbar-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);
            width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
            transition: all 0.3s ease; font-size: 16px; flex-shrink: 0;
        }

        .toolbar-btn:hover { background: var(--accent); border-color: var(--accent); }
        .close-btn:hover { background: var(--danger); border-color: var(--danger); }

        .browser-url-bar {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-primary); padding: 10px 15px; border-radius: 10px;
            font-size: 14px; outline: none; min-width: 0; font-family: inherit;
        }

        #proxyFrame { flex: 1; width: 100%; border: none; background: white; }

        @media (max-width: 768px) {
            .hero-title { font-size: 32px; }
            .quick-links { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .link-card { padding: 15px 10px; }
            .link-emoji { font-size: 24px; }
            .navbar { flex-wrap: wrap; }
            .nav-links { width: 100%; justify-content: center; margin-top: 10px; }
            .container { padding: 10px; }
        }

        @media (max-width: 480px) {
            .quick-links { grid-template-columns: repeat(2, 1fr); }
            .hero-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <span>🌌</span>
                <span>Nebula</span>
            </div>
            <div class="nav-links">
                <button class="nav-link active" onclick="showPage('home')" id="homeLink">Home</button>
                <button class="nav-link" onclick="showPage('games')" id="gamesLink">🎮 Games</button>
                <button class="nav-link" onclick="showPage('apps')" id="appsLink">📱 Apps</button>
                <button class="nav-link" onclick="showPage('settings')" id="settingsLink">⚙️ Settings</button>
            </div>
        </nav>

        <div class="page active" id="homePage">
            <div class="hero-section">
                <h1 class="hero-title"><span class="gradient-text">Browse Freely</span></h1>
                <p class="hero-subtitle">Fast, secure, and private web browsing</p>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="urlInput" class="url-input" placeholder="Search or enter website URL..." autocomplete="off">
                    <button id="goButton" class="go-button">→</button>
                </div>
                <div class="search-hints" id="searchHints">💡 Enter a URL or search anything!</div>
            </div>

            <div class="quick-links">
                <div class="link-card" onclick="openProxy('https://www.youtube.com')">
                    <span class="link-emoji">▶️</span><span>YouTube</span>
                </div>
                <div class="link-card" onclick="openProxy('https://www.reddit.com')">
                    <span class="link-emoji">🤖</span><span>Reddit</span>
                </div>
                <div class="link-card" onclick="openProxy('https://discord.com')">
                    <span class="link-emoji">💬</span><span>Discord</span>
                </div>
                <div class="link-card" onclick="openProxy('https://www.tiktok.com')">
                    <span class="link-emoji">🎵</span><span>TikTok</span>
                </div>
                <div class="link-card" onclick="openProxy('https://twitter.com')">
                    <span class="link-emoji">🐦</span><span>Twitter</span>
                </div>
                <div class="link-card" onclick="openProxy('https://www.spotify.com')">
                    <span class="link-emoji">🎧</span><span>Spotify</span>
                </div>
                <div class="link-card" onclick="openProxy('https://www.netflix.com')">
                    <span class="link-emoji">🎬</span><span>Netflix</span>
                </div>
                <div class="link-card" onclick="openProxy('https://github.com')">
                    <span class="link-emoji">💻</span><span>GitHub</span>
                </div>
            </div>
        </div>

        <div class="browser-overlay" id="browserOverlay">
            <div class="browser-toolbar">
                <button class="toolbar-btn" onclick="browserBack()">←</button>
                <button class="toolbar-btn" onclick="browserForward()">→</button>
                <button class="toolbar-btn" onclick="browserRefresh()">↻</button>
                <input type="text" id="browserUrl" class="browser-url-bar" readonly onclick="this.select()">
                <button class="toolbar-btn close-btn" onclick="closeBrowser()">✕</button>
            </div>
            <iframe id="proxyFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>

    <script>
        // Wait for UV to load
        function openProxy(url) {
            if (typeof __uv$config === 'undefined') {
                alert('Ultraviolet not loaded. Please check your deployment.');
                return;
            }
            
            document.getElementById('browserOverlay').classList.add('active');
            
            // Use Ultraviolet's encode function
            const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);
            
            document.getElementById('proxyFrame').src = encodedUrl;
            document.getElementById('browserUrl').value = url;
        }

        function closeBrowser() {
            document.getElementById('browserOverlay').classList.remove('active');
            document.getElementById('proxyFrame').src = '';
        }

        function browserBack() {
            try { document.getElementById('proxyFrame').contentWindow.history.back(); } catch(e) {}
        }

        function browserForward() {
            try { document.getElementById('proxyFrame').contentWindow.history.forward(); } catch(e) {}
        }

        function browserRefresh() {
            document.getElementById('proxyFrame').src = document.getElementById('proxyFrame').src;
        }

        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById(name + 'Page');
            if (page) page.classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const link = document.getElementById(name + 'Link');
            if (link) link.classList.add('active');
        }

        document.getElementById('goButton').addEventListener('click', navigate);
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') navigate();
        });

        function navigate() {
            let query = document.getElementById('urlInput').value.trim();
            if (!query) return;
            
            let url;
            if (query.startsWith('http://') || query.startsWith('https://')) {
                url = query;
            } else if (query.includes('.') && !query.includes(' ')) {
                url = 'https://' + query;
            } else {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
            }
            
            openProxy(url);
        }

        // Panic key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') window.location.replace('https://www.google.com');
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                document.getElementById('urlInput').focus();
            }
        });

        document.getElementById('urlInput').focus();
    </script>
</body>
</html>
